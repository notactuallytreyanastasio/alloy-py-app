<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Todo Lists{% endblock %} - Alloy ORM Demo</title>
  <link rel="stylesheet" href="/retro.css">
  <style>
    /* --- App-specific overrides --- */
    .desktop {
      padding-top: 32px;
      flex-direction: column;
      align-items: center;
    }

    .win95-window {
      max-width: 720px;
    }

    /* List items in the sunken panel */
    .list-row {
      display: flex;
      align-items: center;
      padding: 5px 8px;
      border-bottom: 1px solid #e0e0e0;
      cursor: default;
    }
    .list-row:last-child {
      border-bottom: none;
    }
    .list-row:hover {
      background: var(--win95-selection);
      color: var(--win95-selection-text);
    }
    .list-row:hover .list-meta {
      color: #aaaacc;
    }
    .list-row:hover .win95-btn {
      color: var(--win95-text);
    }
    .list-name {
      flex: 1;
      font-size: 15px;
      text-decoration: none;
      color: inherit;
    }
    .list-name:hover {
      text-decoration: underline;
    }
    .list-meta {
      font-size: 13px;
      color: var(--win95-btn-shadow);
      margin-right: 8px;
    }

    /* Inline form styling */
    .inline-form {
      display: none;
      padding: 6px 8px;
      background: var(--win95-window-bg);
      border-bottom: 1px solid var(--win95-btn-shadow);
    }
    .inline-form.active {
      display: block;
    }
    .inline-form .form-row {
      margin-bottom: 4px;
    }

    /* Empty state */
    .empty-state {
      padding: 24px;
      text-align: center;
      color: var(--win95-btn-shadow);
      font-size: 15px;
    }

    /* Edit row replaces the normal row */
    .edit-row {
      display: none;
      padding: 4px 6px;
      border-bottom: 1px solid #e0e0e0;
    }
    .edit-row.active {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .edit-row .win95-input {
      flex: 1;
    }

    /* Confirm delete */
    .delete-confirm {
      display: none;
    }
    .delete-confirm.active {
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }

    .list-actions {
      display: flex;
      gap: 4px;
    }

    /* Toolbar input */
    .win95-toolbar .win95-input {
      max-width: none;
    }

    /* Nav bar inside window */
    .app-nav {
      display: flex;
      gap: 2px;
      padding: 4px;
      border-bottom: 1px solid var(--win95-btn-shadow);
      flex-wrap: wrap;
    }
    .app-nav a {
      font-family: 'VT323', 'Chicago', monospace;
      font-size: 13px;
      padding: 2px 10px;
      background: var(--win95-btn-face);
      border: 1px solid;
      border-color: var(--win95-btn-highlight) var(--win95-btn-dark-shadow) var(--win95-btn-dark-shadow) var(--win95-btn-highlight);
      color: var(--win95-text);
      text-decoration: none;
      cursor: pointer;
    }
    .app-nav a:hover {
      background: var(--win95-selection);
      color: var(--win95-selection-text);
    }

    /* SQL debug display */
    .sql-debug {
      background: #1a1a2e;
      color: #00ff41;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      padding: 8px;
      margin: 8px 0;
      border: 2px solid;
      border-color: var(--win95-btn-shadow) var(--win95-btn-highlight) var(--win95-btn-highlight) var(--win95-btn-shadow);
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* Priority badge */
    .priority-badge {
      display: inline-block;
      width: 18px;
      height: 18px;
      line-height: 18px;
      text-align: center;
      font-size: 12px;
      font-weight: bold;
      border: 1px solid #000;
      margin-right: 4px;
    }
    .priority-1 { background: #90ee90; color: #000; }
    .priority-2 { background: #98d8c8; color: #000; }
    .priority-3 { background: #f7dc6f; color: #000; }
    .priority-4 { background: #f0b27a; color: #000; }
    .priority-5 { background: #e74c3c; color: #fff; }

    /* Tag badge */
    .tag-badge {
      display: inline-block;
      font-size: 11px;
      padding: 1px 5px;
      background: #e8daef;
      border: 1px solid #8e44ad;
      margin: 1px 2px;
    }

    /* Table */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .data-table th, .data-table td {
      border: 1px solid var(--win95-btn-shadow);
      padding: 3px 6px;
      text-align: left;
    }
    .data-table th {
      background: var(--win95-btn-face);
      font-weight: bold;
    }
    .data-table tr:hover td {
      background: #ffffcc;
    }

    /* Error list */
    .error-list {
      background: #ffe0e0;
      border: 1px solid #cc0000;
      padding: 6px;
      margin: 8px 0;
      font-size: 13px;
    }
    .error-list li {
      margin-left: 16px;
      color: #cc0000;
    }

    /* Success box */
    .success-box {
      background: #e0ffe0;
      border: 1px solid #00cc00;
      padding: 6px;
      margin: 8px 0;
      font-size: 13px;
      color: #006600;
    }
  </style>
</head>
<body>

  <!-- Mac System 6 Menu Bar -->
  <div class="mac-menubar">
    <span class="apple-logo">&#63743;</span>
    <span class="menu-item app-name">Alloy ORM Demo</span>
    <span class="menu-item">File</span>
    <span class="menu-item">Edit</span>
    <span class="menu-item">Help</span>
  </div>

  <!-- Desktop area -->
  <div class="desktop">
    {% block content %}{% endblock %}
  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
